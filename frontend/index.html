<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4S GHOST • Enterprise Defense System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e27;
            --neon: #00ff9d;
            --accent: #0ea5e9;
            --warning: #e11d48;
            --gold: #f59e0b;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(0, 255, 157, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 157, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: gradientFlow 15s ease-in-out infinite;
        }
        @keyframes gradientFlow {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
        }
        
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Starfield */
        canvas#star-field {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 255, 157, 0.1);
        }
        
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(0, 255, 157, 0.5));
        }
        
        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon);
            text-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
            margin-bottom: 0.3rem;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        
        .version-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            font-size: 0.65rem;
            color: #10b981;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
        }
        
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        
        .input-label {
            font-size: 0.6rem;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
            font-family: 'Orbitron', monospace;
        }
        
        .input-field {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 157, 0.2);
            border-radius: 12px;
            color: var(--neon);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(16, 185, 129, 0.6);
        }
        
        .demo-info {
            margin-top: 1.5rem;
            padding: 0.8rem;
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            font-size: 0.65rem;
            color: #f59e0b;
            text-align: left;
        }
        .demo-info code {
            color: var(--neon);
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
        }
        
        .footer-info {
            margin-top: 1.5rem;
            font-size: 0.6rem;
            color: #64748b;
            letter-spacing: 1px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .stat-item {
            padding: 0.6rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon);
        }
        .stat-label {
            font-size: 0.5rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="star-field"></canvas>
    
    <div class="container">
        <div class="glass-panel">
            <div class="logo-icon">🛡️</div>
            <h1>4S GHOST</h1>
            <div class="subtitle">Enterprise Defense System</div>
            <div class="version-badge">🟢 SYSTEM ONLINE • v1.0.0</div>
            
            <div class="input-group">
                <div class="input-label">▸ USER IDENTITY</div>
                <input type="email" class="input-field" placeholder="admin@dreamos.dev" value="admin@dreamos.dev">
            </div>
            
            <div class="input-group">
                <div class="input-label">▸ ACCESS CREDENTIALS</div>
                <input type="password" class="input-field" placeholder="••••••••••">
            </div>
            
            <button class="btn-login">⚡ INITIATE ACCESS</button>
            
            <div class="demo-info">
                <strong>🔑 DEMO ACCESS:</strong><br>
                <code>Email: admin@dreamos.dev</code><br>
                <code>Pass: (contact admin)</code>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value">70+</div>
                    <div class="stat-label">Tools</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">24/7</div>
                    <div class="stat-label">Monitor</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">AI</div>
                    <div class="stat-label">Defense</div>
                </div>
            </div>
        </div>
        
        <div class="footer-info">
            © 2026 DREAMS Enterprise • System ID: DRE-ENT-001 • ISO 27001
        </div>
    </div>

    <script>
        // Starfield animation
        (function(){
            const canvas = document.getElementById('star-field');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let stars = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            function init() {
                resize();
                stars = [];
                for (let i = 0; i < 150; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 1.5 + 0.3,
                        speed: Math.random() * 0.5 + 0.1
                    });
                }
            }
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                    star.y -= star.speed;
                    if (star.y < -5) {
                        star.y = canvas.height + 5;
                        star.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            }
            
            window.addEventListener('resize', () => { resize(); init(); });
            init();
            draw();
        })();
    </script>
</body>
</html>
