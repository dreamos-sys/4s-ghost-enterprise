<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta name="background-color" content="#050505" />
    <title>4S GHOST • Enterprise</title>
    <style>
      /* PAKSA BACKGROUND GELAP SEJAK DOKUMEN DIMUAT */
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #050505 !important;
        background: #050505 !important;
      }
      /* LOADING SCREEN SAAT APLIKASI MASIH LOAD */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: 99999;
        pointer-events: none;
        animation: fadeOut 0.5s ease 0.5s forwards;
      }
      @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
